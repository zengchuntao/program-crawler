      width: 15
    - key: field
      header: "Field"
      width: 25
    - key: source_url
      header: "Source URL"
      width: 50
    - key: captured_at
      header: "Captured At"
      width: 20
    - key: screenshot_files
      header: "Screenshot Files"
      width: 60
    - key: screenshot_type
      header: "Screenshot Type"
      width: 15
    - key: notes
      header: "Notes"
      width: 40
