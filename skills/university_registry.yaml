# University Registry — known URL patterns for direct access
# Used by the agent when search engines fail or for faster access.
# Format: region → university → entry_points (list of useful URLs)

hong_kong:
  cityu:
    aliases: ["City University of Hong Kong", "CityU", "香港城市大学"]
    entry_points:
      - url: https://www.cb.cityu.edu.hk/postgrad/
        label: College of Business postgraduate
      - url: https://www.cb.cityu.edu.hk/postgrad/?category=Apply
        label: Application info and deadlines
      - url: https://mba.cb.cityu.edu.hk/admissions/online-application
        label: MBA admissions
      - url: https://www.cb.cityu.edu.hk/postgrad/?category=Programme
        label: Programme list
      - url: https://mba.cb.cityu.edu.hk/en/full-time-mba/admissions-requirements-tuition-and-scholarships
        label: MBA tuition and requirements
    notes: >
      Main site www.cityu.edu.hk/pg/ uses Incapsula WAF — blocks both HTTP
      and headless browsers. Use department subdomains instead
      (cb.cityu.edu.hk, mba.cb.cityu.edu.hk work fine).

  hku:
    aliases: ["University of Hong Kong", "HKU", "香港大学", "港大"]
    entry_points:
      - url: https://admissions.hku.hk/tpg/programmes/
        label: TPG programmes and deadlines
      - url: https://www.gradsch.hku.hk/
        label: Graduate school portal
      - url: https://www.hku.hk/prospective-students/taught-postgraduate.html
        label: Prospective TPG students
    notes: Centralized admissions portal; department pages have less detail.

  cuhk:
    aliases: ["Chinese University of Hong Kong", "CUHK", "香港中文大学", "中大"]
    entry_points:
      - url: https://www.gs.cuhk.edu.hk/admissions/
        label: Graduate admissions
      - url: https://www.gs.cuhk.edu.hk/admissions/admissions/application-deadline
        label: Application deadlines
      - url: https://grad.bschool.cuhk.edu.hk/admissions/
        label: Business school graduate admissions
    notes: Separate graduate school and business school portals.

  polyu:
    aliases: ["Hong Kong Polytechnic University", "PolyU", "香港理工大学", "理工"]
    entry_points:
      - url: https://www.polyu.edu.hk/study/pg/taught-postgraduate/
        label: Taught postgraduate
      - url: https://www.polyu.edu.hk/study/pg/
        label: PG study portal
    notes: Static site, HTTP fetch works well.

  hkust:
    aliases: ["Hong Kong University of Science and Technology", "HKUST", "香港科技大学", "科大"]
    entry_points:
      - url: https://pg.ust.hk/prospective-students/programs
        label: Prospective student programs
      - url: https://pg.ust.hk/
        label: Postgraduate portal
      - url: https://mba.ust.hk/
        label: MBA program
    notes: Some pages are SPA-based, may need browser fallback.

  hkbu:
    aliases: ["Hong Kong Baptist University", "HKBU", "香港浸会大学", "浸大"]
    entry_points:
      - url: https://gs.hkbu.edu.hk/admission/
        label: Graduate school admission
    notes: Relatively small graduate program listing.

  lingnan:
    aliases: ["Lingnan University", "岭南大学"]
    entry_points:
      - url: https://www.ln.edu.hk/admissions/postgraduate/
        label: Postgraduate admissions

  eduhk:
    aliases: ["Education University of Hong Kong", "EdUHK", "香港教育大学"]
    entry_points:
      - url: https://www.apply.eduhk.hk/pg/
        label: Postgraduate admissions

